name: Bug Report
description: Report a bug in mileboard
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mileboard Version
      placeholder: "0.1.0"

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "20.x"

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: "1.xx.x"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or log output.
